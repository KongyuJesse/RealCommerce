services:
  - type: web
    name: realcommerce-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/ready
    initialDelaySeconds: 15
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: realcommerce-api
      - key: API_PREFIX
        value: /api
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: realcommerce-web
          envVarKey: PUBLIC_SITE_URL
      - key: CLIENT_ORIGIN_REGEX
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: rc_session
      - key: SESSION_TTL_DAYS
        value: "14"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: None
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: "8"
      - key: AUTH_REGISTER_RATE_LIMIT_MAX_ATTEMPTS
        value: "4"
      - key: GLOBAL_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: GLOBAL_RATE_LIMIT_MAX_REQUESTS
        value: "300"
      - key: PGSSL
        value: "true"
      - key: DB_POOL_MAX
        value: "10"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "15000"
      - key: DB_QUERY_TIMEOUT_MS
        value: "15000"
      - key: TAX_RATE
        value: "0.075"
      - key: FREE_SHIPPING_THRESHOLD
        value: "1200"
      - key: EXCHANGE_RATE_PROVIDER
        value: frankfurter
      - key: EXCHANGE_RATE_PROVIDER_BASE_URL
        value: https://api.frankfurter.app
      - key: EXCHANGE_RATE_SYNC_ENABLED
        value: "true"
      - key: EXCHANGE_RATE_SYNC_INTERVAL_MS
        value: "3600000"
      - key: EXCHANGE_RATE_SYNC_TIMEOUT_MS
        value: "10000"
      - key: MEDIA_STORAGE_PROVIDER
        value: gcs
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCS_KEY_FILENAME
        sync: false
      - key: GCS_CREDENTIALS_JSON
        sync: false
      - key: GCS_CREDENTIALS_BASE64
        sync: false
      - key: GCS_UPLOAD_URL_EXPIRES_SECONDS
        value: "900"
      - key: GCS_PUBLIC_BASE_URL
        sync: false
      - key: EMAIL_PROVIDER
        value: log
      - key: EMAIL_FROM
        value: noreply@realcommerce.com
      - key: EMAIL_FROM_NAME
        value: RealCommerce
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
  - type: web
    name: realcommerce-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeploy: true
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: PUBLIC_SITE_URL
        sync: false
      - key: REACT_APP_API_BASE_URL
        fromService:
          type: web
          name: realcommerce-api
          envVarKey: PUBLIC_API_URL
